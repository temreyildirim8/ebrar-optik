<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 100" width="460" height="100" role="img" aria-label="Ebrar Optik">
  <!-- Glasses icon -->
  <g transform="translate(8, 22)">
    <!-- Left lens circle -->
    <circle cx="20" cy="24" r="18" fill="none" stroke="#292524" stroke-width="2.5" />
    <!-- Right lens circle -->
    <circle cx="56" cy="24" r="18" fill="none" stroke="#292524" stroke-width="2.5" />
    <!-- Bridge connecting the two lenses -->
    <path
      d="M38 24 Q44 20 44 24"
      fill="none"
      stroke="#292524"
      stroke-width="2.5"
      stroke-linecap="round"
    />
    <!-- Left temple arm -->
    <line x1="2" y1="14" x2="2" y2="24" stroke="#292524" stroke-width="2.5" stroke-linecap="round" />
    <!-- Right temple arm -->
    <line x1="74" y1="14" x2="74" y2="24" stroke="#292524" stroke-width="2.5" stroke-linecap="round" />
    <!-- Amber iris dot in right lens -->
    <circle cx="56" cy="24" r="7" fill="#f59e0b" />
    <!-- Pupil dot -->
    <circle cx="56" cy="24" r="3" fill="#292524" />
  </g>

  <!-- Wordmark -->
  <!-- "Ebrar" bold -->
  <text
    x="98"
    y="61"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="44"
    font-weight="800"
    fill="#292524"
  >Ebrar</text>

  <!-- "Optik" regular stone-500 -->
  <text
    x="222"
    y="61"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="44"
    font-weight="400"
    fill="#57534e"
  >Optik</text>
</svg>
