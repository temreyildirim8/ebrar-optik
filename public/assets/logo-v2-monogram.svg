<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240" role="img" aria-label="Ebrar Optik">
  <!-- Outer ring charcoal -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#292524" stroke-width="4" />
  <!-- Inner ring amber -->
  <circle cx="100" cy="100" r="76" fill="none" stroke="#f59e0b" stroke-width="3" />

  <!-- "E" letter -->
  <text
    x="50"
    y="126"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="76"
    font-weight="800"
    fill="#1c1917"
    letter-spacing="-2"
  >e</text>

  <!-- "O" letter -->
  <text
    x="102"
    y="126"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="76"
    font-weight="800"
    fill="#1c1917"
    letter-spacing="-2"
  >o</text>

  <!-- Brand name below -->
  <text
    x="100"
    y="226"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="22"
    font-weight="800"
    fill="#1c1917"
    letter-spacing="5"
    text-anchor="middle"
  >Ebrar Optik</text>
</svg>
