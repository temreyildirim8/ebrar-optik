<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="Ebrar Optik">
  <!-- Eye Icon -->
  <g transform="translate(12, 16)">
    <!-- Eye outline (two arcs forming an eye shape) -->
    <path
      d="M4 24 Q24 4 44 24 Q24 44 4 24 Z"
      fill="none"
      stroke="#292524"
      stroke-width="2.5"
      stroke-linejoin="round"
    />
    <!-- Iris (amber circle) -->
    <circle cx="24" cy="24" r="9" fill="#f59e0b" />
    <!-- Pupil -->
    <circle cx="24" cy="24" r="4" fill="#292524" />
    <!-- Eye lashes hint top -->
    <path
      d="M4 24 Q24 2 44 24"
      fill="none"
      stroke="#292524"
      stroke-width="2.5"
      stroke-linecap="round"
    />
    <!-- Eye lashes hint bottom -->
    <path
      d="M4 24 Q24 46 44 24"
      fill="none"
      stroke="#292524"
      stroke-width="2.5"
      stroke-linecap="round"
    />
  </g>

  <!-- Wordmark -->
  <!-- "Ebrar" bold -->
  <text
    x="72"
    y="50"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="28"
    font-weight="700"
    fill="#292524"
    letter-spacing="-0.5"
  >Ebrar</text>

  <!-- "Optik" regular, stone-500 -->
  <text
    x="172"
    y="50"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="28"
    font-weight="400"
    fill="#78716c"
    letter-spacing="-0.5"
  > Optik</text>
</svg>
